services:

  postgres:
    image: pgvector/pgvector:pg17

    container_name: agentgate-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: agentgate
      POSTGRES_USER: agentgate
      POSTGRES_PASSWORD: agentgate

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentgate"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

    container_name: agentgate-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .

    container_name: agentgate-api

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

volumes:
  postgres_data: