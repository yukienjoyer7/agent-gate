services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: agentgate
      POSTGRES_PASSWORD: agentgate
      POSTGRES_DB: agentgate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentgate"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
