services:

  postgres:
    image: pgvector/pgvector:pg17

    container_name: agentgate-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: agentgate
      POSTGRES_USER: agentgate
      POSTGRES_PASSWORD: agentgate

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    container_name: agentgate-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

  api:
    build:
      context: .

    container_name: agentgate-api

    restart: unless-stopped

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

    volumes:
      - .:/app

volumes:
  postgres_data: